<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d13" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BattleChis" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>BattleChis - Tactical Commander</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Registrar el service worker SOLO en producción (https + dominio real),
      // para permitir instalar la PWA. En desarrollo (localhost / IP local) se
      // desregistra y limpia cachés, evitando servir versiones viejas.
      if ('serviceWorker' in navigator) {
        var h = location.hostname;
        var isDev = h === 'localhost' || h === '127.0.0.1' ||
                    /^192\.168\./.test(h) || /^10\./.test(h) || /^172\.(1[6-9]|2\d|3[01])\./.test(h);
        window.addEventListener('load', function () {
          if (isDev || location.protocol !== 'https:') {
            navigator.serviceWorker.getRegistrations()
              .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); });
            if (window.caches) {
              caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); });
            }
          } else {
            navigator.serviceWorker.register('/sw.js')
              .then(function (reg) {
                console.log('SW registrado:', reg.scope);
                // Comprobar si hay versión nueva al abrir y cada 60s.
                reg.update();
                setInterval(function () { reg.update(); }, 60000);
              })
              .catch(function (err) { console.log('SW error:', err); });

            // Cuando un SW nuevo toma el control, recargar una sola vez para
            // que la pestaña abierta pase a la última versión automáticamente.
            var refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (refreshing) return;
              refreshing = true;
              window.location.reload();
            });
          }
        });
      }
    </script>
  </body>
</html>
